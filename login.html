<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 📚二手以上的图书商城</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-bar">
        <div class="container">
            <div class="logo"><a href="index.html">📚二手以上的图书商城</a><span class="slogan">二手图书·循环温暖</span></div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="product-detail.html?id=1">商品详情</a>
                <a href="cart.html">购物车 🛒<span id="cartCount" class="cart-badge">0</span></a>
                <a href="profile.html">会员中心</a>
                <a href="login.html" class="active">登录/注册</a>
                <span class="user-info">陈梓淇 24215220102</span>
            </div>
        </div>
    </div>
    <div class="form-container">
        <h2 style="text-align:center;">会员登录</h2>
        <form id="loginForm">
            <div class="form-group"><label>用户名</label><input type="text" id="username" required></div>
            <div class="form-group"><label>密码</label><input type="password" id="password" required></div>
            <button type="button" class="btn-primary" style="width:100%;" onclick="login()">登录</button>
            <p style="text-align:center; margin-top:20px;">还没有账号？<a href="register.html">立即注册</a></p>
        </form>
    </div>
    <div class="footer">
        <p>© 2026 📚二手以上的图书商城 | 陈梓淇 24215220102</p>
    </div>
    <script src="js/common.js"></script>
    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const pwd = document.getElementById('password').value.trim();
            if (!username || !pwd) { alert("用户名和密码不能为空"); return; }
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.username === username && u.password === pwd);
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify({ id: user.id, username: user.username }));
                alert("登录成功");
                window.location.href = 'index.html';
            } else {
                alert("用户名或密码错误");
            }
        }
    </script>
</body>
</html>
