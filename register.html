<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册 - 📚二手以上的图书商城</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="top-bar">
        <div class="container">
            <div class="logo"><a href="index.html">📚 二手以上的图书商城</a><span class="slogan">二手图书·循环温暖</span></div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="product-detail.html?id=1">商品详情</a>
                <a href="cart.html">购物车 🛒<span id="cartCount" class="cart-badge">0</span></a>
                <a href="profile.html">会员中心</a>
                <a href="login.html" class="active">登录/注册</a>
                <span class="user-info">陈梓淇 24215220102</span>
            </div>
        </div>
    </div>
    <div class="form-container">
        <h2 style="text-align:center;">免费注册</h2>
        <form>
            <div class="form-group"><label>用户名</label><input type="text" id="regUsername" required></div>
            <div class="form-group"><label>密码</label><input type="password" id="regPassword" required><small>密码长度至少6位</small></div>
            <div class="form-group"><label>确认密码</label><input type="password" id="confirmPwd" required></div>
            <div class="form-group"><label>联系电话</label><input type="tel" id="phone" placeholder="选填"></div>
            <button type="button" class="btn-primary" style="width:100%;" onclick="register()">注册</button>
            <p style="text-align:center; margin-top:20px;">已有账号？<a href="login.html">去登录</a></p>
        </form>
    </div>
    <div class="footer">
        <p>© 2026 📚二手以上的图书商城 | 陈梓淇 24215220102</p>
    </div>
    <script>
        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const pwd = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('confirmPwd').value.trim();
            const phone = document.getElementById('phone').value.trim();
            if (!username || !pwd) { alert("用户名和密码不能为空"); return; }
            if (pwd.length < 6) { alert("密码长度至少6位"); return; }
            if (pwd !== confirm) { alert("两次密码不一致"); return; }
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => u.username === username)) { alert("用户名已存在"); return; }
            const newId = users.length > 0 ? Math.max(...users.map(u => u.id)) + 1 : 1;
            const newUser = { id: newId, username: username, password: pwd, phone: phone, regTime: new Date().toISOString() };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            alert("注册成功，请登录");
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
